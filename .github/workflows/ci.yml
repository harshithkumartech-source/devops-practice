name: Complete CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # Job 1 - Lint (is code written cleanly?)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run ESLint
        run: npx eslint . --ext .js --ignore-pattern node_modules/
        continue-on-error: true  # won't block for now

  # Job 2 - Unit tests + coverage (runs parallel with lint)
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - run: npm install
      - name: Run unit tests with coverage
        run: npm test
      - name: Show coverage summary
        run: echo "Coverage report generated!"

  # Job 3 - Build Docker image + Trivy scan
  # Only runs after both lint and tests pass
  build-and-scan:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-practice:${{ github.sha }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-practice:${{ github.sha }}
          format: 'table'
          exit-code: '0'        # set to '1' to fail on critical CVEs
          severity: 'CRITICAL,HIGH'

      - name: Image built and scanned successfully
        run: echo "Image devops-practice:${{ github.sha }} is clean!"
